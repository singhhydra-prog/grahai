<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      .gold { fill: #C9A24D; }
      .gold-stroke { stroke: #C9A24D; fill: none; }
    </style>
  </defs>
  
  <!-- Background circle (optional, transparent by default) -->
  
  <!-- Outer orbital ring -->
  <circle cx="50" cy="50" r="45" class="gold-stroke" stroke-width="2" opacity="0.7"/>
  
  <!-- Inner orbital ring -->
  <circle cx="50" cy="50" r="32" class="gold-stroke" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Planet nodes on outer orbit -->
  <circle cx="50" cy="12" r="3" class="gold" opacity="0.8"/>
  <circle cx="79" cy="50" r="2.5" class="gold" opacity="0.6"/>
  <circle cx="50" cy="88" r="2.5" class="gold" opacity="0.6"/>
  <circle cx="21" cy="50" r="2" class="gold" opacity="0.4"/>
  
  <!-- Letter "G" with gold fill -->
  <g transform="translate(50, 50)">
    <!-- Main "G" shape -->
    <path d="M -12,-18 A 20,20 0 0,1 18,-2 L 18,-8 A 14,14 0 0,0 -8,-18 A 14,14 0 0,0 -14,0 A 14,14 0 0,0 8,18 A 14,14 0 0,0 18,12 L 18,2 A 14,14 0 0,0 8,-16 A 14,14 0 0,0 -12,-18 Z" 
          class="gold" stroke="none"/>
  </g>
  
  <!-- Small decorative star elements at cardinal points -->
  <circle cx="50" cy="8" r="1.5" class="gold" opacity="0.6"/>
  <circle cx="92" cy="50" r="1.5" class="gold" opacity="0.6"/>
  <circle cx="50" cy="92" r="1.5" class="gold" opacity="0.6"/>
  <circle cx="8" cy="50" r="1.5" class="gold" opacity="0.6"/>
</svg>
