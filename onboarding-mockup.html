<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>GrahAI — Onboarding Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0A0E1A;
    color: #F1F0F5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 390px;
    margin: 0 auto;
    overflow: hidden;
    height: 100vh;
  }

  /* Progress dots */
  .progress-bar {
    display: flex;
    gap: 8px;
    padding: 16px 24px 8px;
  }
  .progress-dot {
    height: 4px;
    flex: 1;
    border-radius: 999px;
    transition: all 0.5s;
  }
  .progress-dot.active {
    background: linear-gradient(to right, #D4A054, #A16E2A);
  }
  .progress-dot.inactive {
    background: #1E293B;
  }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    text-align: center;
  }

  /* Spline star container */
  .spline-container {
    width: 224px;
    height: 224px;
    margin: 0 auto 24px;
    position: relative;
    border-radius: 50%;
    overflow: hidden;
  }
  .spline-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
    color: #F1F0F5;
  }
  .gold-text {
    background: linear-gradient(135deg, #D4A054, #F5D17F, #D4A054);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    color: #94A3B8;
    line-height: 1.6;
    max-width: 320px;
  }

  /* CTA button */
  .cta-section {
    padding: 24px;
    width: 100%;
  }
  .cta-button {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #D4A054, #B8863C);
    color: #0A0E1A;
    font-weight: 600;
    font-size: 16px;
    font-family: 'Inter', system-ui, sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 24px rgba(212,160,84,0.25);
    transition: transform 0.2s;
  }
  .cta-button:hover { transform: scale(1.02); }
  .cta-button svg {
    width: 18px; height: 18px;
  }

  /* Status bar mockup */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 24px;
    font-size: 12px;
    font-weight: 600;
    color: #F1F0F5;
  }
  .status-bar .time { font-size: 15px; font-weight: 600; }
  .status-icons { display: flex; gap: 4px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; fill: #F1F0F5; }
</style>
</head>
<body>

<!-- Status bar -->
<div class="status-bar">
  <span class="time">9:41</span>
  <div class="status-icons">
    <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
    <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
  </div>
</div>

<!-- Progress dots -->
<div class="progress-bar">
  <div class="progress-dot active"></div>
  <div class="progress-dot inactive"></div>
  <div class="progress-dot inactive"></div>
  <div class="progress-dot inactive"></div>
</div>

<!-- Main content -->
<div class="content">
  <!-- Spline 3D Star -->
  <div class="spline-container">
    <iframe
      src="https://my.spline.design/astarlikeourown-ukvK2EaYKfmPcjkfa9xzQqmD/"
      frameborder="0"
      width="100%"
      height="100%"
      allow="autoplay"
      title="3D Star"
    ></iframe>
  </div>

  <h1>
    Clear answers for love,
    <span class="gold-text">career, timing,</span>
    and life.
  </h1>
  <p class="subtitle">
    GrahAI reads your chart to give calm, practical guidance
    for the decisions that matter.
  </p>
</div>

<!-- CTA -->
<div class="cta-section">
  <button class="cta-button">
    Begin Your Reading
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
  </button>
</div>

</body>
</html>
