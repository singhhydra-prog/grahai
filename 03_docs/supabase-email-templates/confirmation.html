<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#0B0E1A;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0B0E1A;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background-color:#111627;border-radius:16px;border:1px solid rgba(201,162,77,0.15);padding:40px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:28px;font-weight:800;color:#E8E0D0;letter-spacing:-0.5px;">Grah<span style="color:#C9A24D;">AI</span></span>
              <br>
              <span style="font-size:10px;letter-spacing:3px;color:rgba(201,162,77,0.5);text-transform:uppercase;">Vedic Intelligence</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <h1 style="margin:0;font-size:22px;font-weight:700;color:#E8E0D0;">Confirm Your Email</h1>
              <p style="margin:8px 0 0;font-size:14px;color:rgba(232,224,208,0.45);">Welcome to GrahAI — verify your email to begin</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;background:linear-gradient(135deg,#C9A24D,#E2C474);color:#0B0E1A;font-size:15px;font-weight:700;text-decoration:none;padding:14px 36px;border-radius:10px;letter-spacing:0.3px;">
                Confirm Email Address
              </a>
            </td>
          </tr>
          <tr>
            <td align="center" style="border-top:1px solid rgba(255,255,255,0.04);padding-top:20px;">
              <p style="margin:0;font-size:11px;color:rgba(232,224,208,0.2);line-height:1.6;">
                If you didn't create an account with GrahAI, you can safely ignore this email.<br>
                This link expires in 24 hours.
              </p>
            </td>
          </tr>
        </table>
        <p style="margin-top:20px;font-size:10px;color:rgba(232,224,208,0.15);">
          &copy; 2026 GrahAI — AI-Powered Vedic Wisdom
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
